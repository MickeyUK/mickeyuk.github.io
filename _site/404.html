<script>
  $(document).ready(function(){

    var quotes = [
      [
        "https://twitter.com/TomCruise/status/16726192933",
        "Sorry, I would try and fix this page but I am currently trying to harness all this Bieber energy for my next project. Click <a href=\"javascript:history.go(-1)\">HERE</a> to go back."

      ],
      [
        'https://twitter.com/billyraycyrus/status/608133696932020224',
        'Indeed...like where the stuffing this page has gone. Click <a href=\"javascript:history.go(-1)\">HERE</a> to go back.'

        'I dunno...minerals, or something. The better question is where has this page gone? Click <a href=\"javascript:history.go(-1)\">HERE</a> to go back.'
      ]
    ];
    var quote = quotes[Math.floor(Math.random() * quotes.length)];

    $.ajax({
      url: "https://publish.twitter.com/oembed?hide_media=true&url="+quote[0],

      dataType: "jsonp",
      success: function( response ) {
          $("#404-tweet").html(response.html);
          $("#404-tweet").append('<div class="post-container" style="max-width:500px; margin-top: 20px">'+quote[1]+'</div>');
          $("#404-tweet").delay(500).fadeIn("fast");
      }
    });
  });

</script>
