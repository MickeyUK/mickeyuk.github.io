<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {% include head.html %}

  <body id="page" {% if page.background != '' %} style="background-image: url({{ page.background }});" {% endif %}>

    {% include header.html active="Blog" %}

    <div id="main">

      <div id="blog-body">
        <div id="blog">

          {% for post in site.posts %}

          <div class="post-container">
            <div class="post-header">
              <div class="post-ribbon">
                <div class="post-date">
                  <div class="day">
                    {{ post.date | date: "%d" }}
                  </div>
                  <div class="month-year">
                    {{ post.date | date: "%b %Y" }}
                  </div>
                </div>
              </div>
              <div class="post-title">
                <h1><a href="{{ post.url }}">{{ post.title }}</a></h1>
              </div>
            </div>
            <div class="post-content">
              {{ post.excerpt }}
            </div>
            <div class="post-footer">
              <a href="{{ post.url }}">READ MORE</a>
            </div>
          </div>

          {% endfor %}

        </div>

      </div>

      {% include footer.html %}

    </div>

  </body>

  {% include jquery.html %}

</html>
